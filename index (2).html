<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Assessment — DeRisk Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #2D5A1B;
    --green-mid: #3B6D11;
    --green-light: #7AB648;
    --green-pale: #EAF3DE;
    --green-border: #97C459;
    --amber: #BA7517;
    --amber-pale: #FAEEDA;
    --amber-border: #EF9F27;
    --red: #A32D2D;
    --red-pale: #FCEBEB;
    --red-border: #F09595;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.22);
    --bg: #ffffff;
    --bg-secondary: #f7f7f5;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f2;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .card {
    background: var(--bg);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 620px;
    border: 0.5px solid var(--border);
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--green-dark);
    margin-bottom: 0.25rem;
    letter-spacing: -0.3px;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1.75rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green-light);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-count {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .section-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--green-mid);
    background: var(--green-pale);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 1rem;
  }

  .question {
    font-family: 'DM Serif Display', serif;
    font-size: 21px;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }

  .opt:hover {
    border-color: var(--border-hover);
    background: var(--bg-secondary);
  }

  .opt.selected {
    border-color: var(--green-light);
    background: var(--green-pale);
  }

  .opt-letter {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 0.5px solid var(--border-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .opt.selected .opt-letter {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: #fff;
  }

  .opt-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    padding-top: 2px;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-back {
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 0;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-back:hover { color: var(--text); }

  .btn-next {
    padding: 10px 26px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.2s;
  }

  .btn-next.active { opacity: 1; }

  /* Result */
  .result { display: none; }
  .result.visible { display: block; }
  .quiz-wrap.hidden { display: none; }

  .risk-block {
    border-radius: 12px;
    padding: 1.75rem;
    margin: 1.5rem 0;
    border: 0.5px solid;
  }

  .risk-block.verde { background: var(--green-pale); border-color: var(--green-border); }
  .risk-block.giallo { background: var(--amber-pale); border-color: var(--amber-border); }
  .risk-block.rosso { background: var(--red-pale); border-color: var(--red-border); }

  .risk-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .verde .risk-eyebrow { color: var(--green-mid); }
  .giallo .risk-eyebrow { color: var(--amber); }
  .rosso .risk-eyebrow { color: var(--red); }

  .risk-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: 0.35rem;
  }

  .verde .risk-title { color: var(--green-dark); }
  .giallo .risk-title { color: #633806; }
  .rosso .risk-title { color: #791F1F; }

  .risk-pts {
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .verde .risk-pts { color: var(--green-mid); }
  .giallo .risk-pts { color: var(--amber); }
  .rosso .risk-pts { color: var(--red); }

  .risk-body {
    font-size: 14px;
    line-height: 1.65;
  }

  .verde .risk-body { color: var(--green-dark); }
  .giallo .risk-body { color: #633806; }
  .rosso .risk-body { color: #791F1F; }

  .dim-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 1.5rem 0;
  }

  .dim-card {
    padding: 12px 14px;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
  }

  .dim-name {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 7px;
  }

  .dim-track {
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 5px;
  }

  .dim-fill { height: 100%; border-radius: 999px; }

  .dim-score {
    font-size: 12px;
    color: var(--text-muted);
  }

  .email-block {
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    background: var(--bg-secondary);
    margin-top: 1.5rem;
  }

  .email-block p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1rem;
    line-height: 1.55;
  }

  .email-row {
    display: flex;
    gap: 8px;
  }

  .email-input {
    flex: 1;
    padding: 10px 14px;
    border: 0.5px solid var(--border-hover);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  .email-input:focus { border-color: var(--green-light); }

  .email-send {
    padding: 10px 18px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  .email-ok {
    font-size: 13px;
    color: var(--green-mid);
    margin-top: 0.5rem;
    display: none;
  }

  .cta-section { margin-top: 1.75rem; }

  .cta-title {
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .cta-stack { display: flex; flex-direction: column; gap: 10px; }

  .cta-primary {
    display: block;
    padding: 13px 20px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }

  .cta-secondary {
    display: block;
    padding: 13px 20px;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-hover);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }

  .restart {
    display: block;
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    width: 100%;
  }

  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem; }
    .dim-grid { grid-template-columns: 1fr; }
    .email-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="card">

  <div class="quiz-wrap" id="quizWrap">
    <div class="brand">DeRisk Lab</div>
    <div class="brand-sub">Risk Assessment</div>

    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:8.33%"></div>
      </div>
      <div class="progress-count" id="progressCount">1 di 12</div>
    </div>

    <div class="section-pill" id="sectionPill"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsList"></div>

    <div class="nav">
      <button class="btn-back" id="btnBack" onclick="goBack()">← Indietro</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Avanti</button>
    </div>
  </div>

  <div class="result" id="resultWrap">
    <div class="brand">DeRisk Lab</div>
    <div class="brand-sub">Il tuo profilo di rischio</div>

    <div class="risk-block" id="riskBlock">
      <div class="risk-eyebrow" id="riskEyebrow"></div>
      <div class="risk-title" id="riskTitle"></div>
      <div class="risk-pts" id="riskPts"></div>
      <div class="risk-body" id="riskBody"></div>
    </div>

    <div class="dim-grid" id="dimGrid"></div>

    <div class="email-block">
      <p>Vuoi ricevere il report completo con raccomandazioni dettagliate per ogni dimensione?</p>
      <div class="email-row">
        <input class="email-input" type="email" id="emailInput" placeholder="La tua email aziendale" />
        <button class="email-send" onclick="sendReport()">Invia report</button>
      </div>
      <div class="email-ok" id="emailOk">Report in arrivo. Controlla la tua casella.</div>
    </div>

    <div class="cta-section">
      <div class="cta-title" id="ctaTitle"></div>
      <div class="cta-stack">
        <button class="cta-primary" id="ctaPrimary"></button>
        <a class="cta-secondary" href="https://derisklab.it" target="_blank">Scopri come funziona il percorso</a>
      </div>
      <button class="restart" onclick="restart()">Ricomincia il test</button>
    </div>
  </div>

</div>

<script>
const questions = [
  { section: "Validazione del problema", text: "Come è nata l'idea?", options: [
    { label: "Da un'intuizione o da un'idea venuta a tavolino", pts: 0 },
    { label: "Da un problema che ho vissuto direttamente o che mi è stato segnalato più volte da potenziali clienti", pts: 2 },
    { label: "Osservando un trend o un mercato che mi sembrava interessante", pts: 1 }
  ]},
  { section: "Validazione del problema", text: "Hai mai parlato del problema (non della soluzione) con qualcuno del tuo target?", options: [
    { label: "Sì, ma sono stato io a introdurlo e a chiedere se lo riconoscessero", pts: 1 },
    { label: "Non ancora, ma lo farò durante lo sviluppo", pts: 0 },
    { label: "Sì, con almeno 10 persone e il problema è emerso spontaneamente nella conversazione", pts: 2 }
  ]},
  { section: "Segnali di mercato reali", text: "Qualcuno ha già espresso interesse concreto: pre-ordine, lista d'attesa, disponibilità a pagare?", options: [
    { label: "Sì, ho già raccolto manifestazioni d'interesse concrete (anche informali ma esplicite)", pts: 2 },
    { label: "Non ancora, ma sono sicuro che ci sarà domanda", pts: 0 },
    { label: "Ho ricevuto feedback positivi, ma nessuno si è ancora esposto economicamente", pts: 1 }
  ]},
  { section: "Segnali di mercato reali", text: "Il problema che vuoi risolvere viene già affrontato in qualche modo dal tuo target?", options: [
    { label: "Lo gestiscono internamente in modo inefficiente", pts: 1 },
    { label: "Sì, usano soluzioni alternative o workaround: questo conferma che il problema esiste", pts: 2 },
    { label: "Non lo gestiscono, quindi il mercato è tutto da conquistare", pts: 0 }
  ]},
  { section: "Conoscenza del mercato", text: "Sai chi sono i tuoi competitor diretti o indiretti?", options: [
    { label: "Ne conosco qualcuno, ma non ho approfondito", pts: 1 },
    { label: "Non ho competitor: siamo i primi a fare questa cosa", pts: 0 },
    { label: "Sì, ho fatto un'analisi e so cosa offrono, a che prezzo e a chi", pts: 2 }
  ]},
  { section: "Conoscenza del mercato", text: "Hai un'idea della dimensione del mercato a cui ti rivolgi?", options: [
    { label: "Il mercato è enorme, non ho bisogno di quantificarlo", pts: 0 },
    { label: "Sì, ho dati o stime concrete (anche approssimative ma ragionate)", pts: 2 },
    { label: "Ho un'idea generale, ma non ho mai cercato dati", pts: 1 }
  ]},
  { section: "Chiarezza sulla soluzione", text: "Riesci a descrivere il tuo prodotto in due frasi, senza usare la parola \"piattaforma\"?", options: [
    { label: "Sì, e lo descrivo sempre allo stesso modo", pts: 2 },
    { label: "È complesso da spiegare: ha molte funzionalità e si adatta a diversi contesti", pts: 0 },
    { label: "Sì, ma la descrizione cambia un po' a seconda di chi ho davanti", pts: 1 }
  ]},
  { section: "Chiarezza sulla soluzione", text: "Hai già definito cosa fa il prodotto nella versione minima e soprattutto cosa NON fa?", options: [
    { label: "Ho un'idea delle funzionalità principali, ma i confini non sono ancora definiti", pts: 1 },
    { label: "Sì, ho una lista chiara di feature incluse ed escluse nella prima versione", pts: 2 },
    { label: "Voglio lanciare qualcosa di completo: un MVP incompleto darebbe un'immagine sbagliata", pts: 0 }
  ]},
  { section: "Execution readiness", text: "C'è una persona interna dedicata a seguire questo progetto?", options: [
    { label: "Lo gestiamo tutti un po', quando c'è tempo", pts: 0 },
    { label: "Sì, c'è un referente con tempo allocato specificamente su questo", pts: 2 },
    { label: "Me ne occupo io, ma ho anche molte altre priorità", pts: 1 }
  ]},
  { section: "Execution readiness", text: "Hai un budget definito e approvato per la fase di sviluppo?", options: [
    { label: "Sì, il budget è definito e approvato", pts: 2 },
    { label: "Dipende da quanto costerà: vediamo i preventivi e poi decidiamo", pts: 0 },
    { label: "Ho un'idea di massima, ma non è ancora formalizzato", pts: 1 }
  ]},
  { section: "Consapevolezza tecnica", text: "Hai già coinvolto qualcuno con competenze tecniche o di prodotto nella definizione dell'idea?", options: [
    { label: "Prima voglio definire bene l'idea, poi coinvolgerò i tecnici", pts: 0 },
    { label: "Sì, un CTO, un product manager o un consulente ha già contribuito alla definizione", pts: 2 },
    { label: "Ho parlato con qualche sviluppatore per avere un'idea dei costi", pts: 1 }
  ]},
  { section: "Consapevolezza tecnica", text: "Come sei arrivato alla stima del costo di sviluppo?", options: [
    { label: "Ho ricevuto preventivi dettagliati dopo aver condiviso specifiche scritte", pts: 2 },
    { label: "Ho un numero in testa, ma non ho ancora chiesto preventivi", pts: 0 },
    { label: "Ho avuto conversazioni informali con alcune software house", pts: 1 }
  ]}
];

const sections = ["Validazione del problema","Segnali di mercato reali","Conoscenza del mercato","Chiarezza sulla soluzione","Execution readiness","Consapevolezza tecnica"];
const sectionIdx = { "Validazione del problema":[0,1], "Segnali di mercato reali":[2,3], "Conoscenza del mercato":[4,5], "Chiarezza sulla soluzione":[6,7], "Execution readiness":[8,9], "Consapevolezza tecnica":[10,11] };
const dimColors = ["#3B6D11","#BA7517","#185FA5","#3B6D11","#993C1D","#533AB7"];

let cur = 0, answers = new Array(12).fill(null);

function render() {
  const q = questions[cur];
  document.getElementById('sectionPill').textContent = q.section;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressCount').textContent = (cur+1) + ' di 12';
  document.getElementById('progressFill').style.width = ((cur+1)/12*100) + '%';
  document.getElementById('btnBack').style.visibility = cur === 0 ? 'hidden' : 'visible';
  document.getElementById('btnNext').textContent = cur === 11 ? 'Vedi risultato' : 'Avanti';
  document.getElementById('btnNext').className = 'btn-next' + (answers[cur] !== null ? ' active' : '');

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  ['A','B','C'].forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[cur] === i ? ' selected' : '');
    btn.innerHTML = `<div class="opt-letter">${l}</div><div class="opt-text">${q.options[i].label}</div>`;
    btn.onclick = () => pick(i);
    list.appendChild(btn);
  });
}

function pick(i) {
  answers[cur] = i;
  document.querySelectorAll('.opt').forEach((b,idx) => b.className = 'opt' + (idx===i?' selected':''));
  document.getElementById('btnNext').className = 'btn-next active';
}

function goNext() {
  if (answers[cur] === null) return;
  if (cur < 11) { cur++; render(); } else showResult();
}

function goBack() { if (cur > 0) { cur--; render(); } }

function showResult() {
  document.getElementById('quizWrap').className = 'quiz-wrap hidden';
  document.getElementById('resultWrap').className = 'result visible';

  let total = 0;
  answers.forEach((a,i) => { if(a!==null) total += questions[i].options[a].pts; });

  let cls, eyebrow, title, body, ctaTitle, ctaLabel;
  if (total >= 20) {
    cls='verde'; eyebrow='Rischio contenuto'; title='Basi solide';
    body='Hai fatto molto lavoro prima di arrivare qui. Il percorso di validazione ti serve per blindare le ultime incertezze prima di investire — non per ricominciare da capo, ma per arrivare allo sviluppo con un brief a prova di software house.';
    ctaTitle='Pronto per il passo successivo?'; ctaLabel='Scarica la guida alla validazione';
  } else if (total >= 13) {
    cls='giallo'; eyebrow='Rischio elevato'; title='Intuizioni valide, lacune concrete';
    body='Hai le idee giuste ma alcune aree critiche non sono ancora presidiate. Procedere adesso significa bruciare budget su ipotesi non verificate. Tre o quattro settimane di validazione strutturata possono cambiare radicalmente le probabilità di successo.';
    ctaTitle='Come ridurre il rischio prima di investire?'; ctaLabel='Prenota una sessione gratuita';
  } else {
    cls='rosso'; eyebrow='Rischio critico'; title='Validazione necessaria';
    body="L'idea ha potenziale, ma ogni euro speso adesso è un euro a rischio. Non perché l'idea sia sbagliata — ma perché non hai ancora gli elementi per saperlo. Il percorso di validazione esiste esattamente per questa situazione.";
    ctaTitle='Partiamo dalla validazione?'; ctaLabel='Prenota una sessione gratuita';
  }

  document.getElementById('riskBlock').className = 'risk-block ' + cls;
  document.getElementById('riskEyebrow').textContent = eyebrow;
  document.getElementById('riskTitle').textContent = title;
  document.getElementById('riskPts').textContent = 'Punteggio: ' + total + ' su 24';
  document.getElementById('riskBody').textContent = body;
  document.getElementById('ctaTitle').textContent = ctaTitle;
  document.getElementById('ctaPrimary').textContent = ctaLabel;
  document.getElementById('ctaPrimary').onclick = () => { window.location.href = 'https://derisklab.it'; };

  const grid = document.getElementById('dimGrid');
  grid.innerHTML = '';
  sections.forEach((sec, si) => {
    const idxs = sectionIdx[sec];
    let pts = 0;
    idxs.forEach(i => { if(answers[i]!==null) pts += questions[i].options[answers[i]].pts; });
    const pct = Math.round(pts/4*100);
    const d = document.createElement('div');
    d.className = 'dim-card';
    d.innerHTML = `<div class="dim-name">${sec}</div><div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${dimColors[si]}"></div></div><div class="dim-score">${pts}/4</div>`;
    grid.appendChild(d);
  });
}

function sendReport() {
  const v = document.getElementById('emailInput').value;
  if (!v || !v.includes('@')) { document.getElementById('emailInput').style.borderColor='#E24B4A'; return; }
  document.getElementById('emailInput').style.borderColor='';
  document.getElementById('emailOk').style.display='block';
}

function restart() {
  cur=0; answers=new Array(12).fill(null);
  document.getElementById('quizWrap').className='quiz-wrap';
  document.getElementById('resultWrap').className='result';
  render();
}

render();
</script>
</body>
</html>
